{% extends "base.html" %}

{% block title %}Nouvelle formation{% endblock %}

{% block content %}
<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card shadow-sm">
                <div class="card-header bg-primary text-white">
                    <h4 class="mb-0">
                        <i class="fas fa-plus-circle me-2"></i>
                        Nouvelle formation
                    </h4>
                </div>
                <div class="card-body">
                    <form method="POST">
                        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                        
                        <div class="mb-3">
                            <label class="form-label required-field">Titre *</label>
                            <input type="text" class="form-control" name="titre" required>
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label">Description</label>
                            <textarea class="form-control" name="description" rows="3"></textarea>
                        </div>
                        
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Type</label>
                                <select class="form-select" name="type_formation">
                                    <option value="interne">🏢 Interne</option>
                                    <option value="externe">🌍 Externe</option>
                                    <option value="e-learning">💻 E-learning</option>
                                    <option value="certification">🎓 Certification</option>
                                    <option value="atelier">🤝 Atelier</option>
                                </select>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Durée (heures)</label>
                                <input type="number" class="form-control" name="duree_heures" step="0.5">
                            </div>
                        </div>
                        
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Date début</label>
                                <input type="date" class="form-control" name="date_debut">
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Date fin</label>
                                <input type="date" class="form-control" name="date_fin">
                            </div>
                        </div>
                        
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Coût (€)</label>
                                <input type="number" class="form-control" name="cout" step="0.01">
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Formateur</label>
                                <input type="text" class="form-control" name="formateur">
                            </div>
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label">Objectifs</label>
                            <textarea class="form-control" name="objectifs" rows="3"></textarea>
                        </div>
                        
                        <div class="d-flex justify-content-end gap-2">
                            <a href="{{ url_for('liste_formations') }}" class="btn btn-secondary">Annuler</a>
                            <button type="submit" class="btn btn-primary">Créer</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
