<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Egalyx   — Suite Documentaire Juridique</title>
    <style>
        /* ===== IMPORTS GOOGLE FONTS ===== */
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap');

        /* ===== RESET ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #f0f2f7;
            padding: 24px;
            color: #0a0a1a;
            min-height: 100vh;
        }

        .app-container {
            max-width: 1440px;
            margin: 0 auto;
            background: #ffffff;
            border-radius: 28px;
            box-shadow: 0 30px 80px rgba(10, 10, 26, 0.12), 0 10px 30px rgba(10, 10, 26, 0.05);
            overflow: hidden;
            position: relative;
        }

        .app-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 6px;
            background: linear-gradient(90deg, #c9a84c, #f0d080, #c9a84c, #a8873a);
            z-index: 10;
        }

        /* ===== HEADER ===== */
        .app-header {
            background: linear-gradient(135deg, #080c1a 0%, #121c34 40%, #1a2a4a 70%, #0f1a30 100%);
            padding: 26px 42px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            border-bottom: 1px solid rgba(201, 168, 76, 0.15);
            position: relative;
        }

        .app-header::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 10%;
            right: 10%;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(201, 168, 76, 0.4), transparent);
        }

        .app-header .logo-area {
            display: flex;
            align-items: center;
            gap: 18px;
        }

        .app-header .logo-icon {
            width: 56px;
            height: 56px;
            background: linear-gradient(145deg, #c9a84c, #b8932e, #f0d080);
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: 24px;
            color: #080c1a;
            font-family: 'Playfair Display', serif;
            box-shadow: 0 4px 20px rgba(201, 168, 76, 0.35);
            flex-shrink: 0;
            position: relative;
        }

        .app-header .logo-icon::after {
            content: '';
            position: absolute;
            inset: -2px;
            border-radius: 16px;
            background: linear-gradient(145deg, rgba(201, 168, 76, 0.3), transparent);
            z-index: -1;
        }

        .app-header .logo-text {
            color: #ffffff;
            font-weight: 700;
            font-size: 24px;
            letter-spacing: 0.5px;
            font-family: 'Playfair Display', serif;
        }

        .app-header .logo-text span {
            color: #c9a84c;
            font-weight: 300;
            font-style: italic;
        }

        .app-header .logo-sub {
            font-size: 11px;
            color: rgba(255, 255, 255, 0.4);
            letter-spacing: 3px;
            text-transform: uppercase;
            font-weight: 300;
            margin-top: 2px;
        }

        .app-header .badge {
            background: rgba(201, 168, 76, 0.12);
            color: #f0d080;
            padding: 8px 24px;
            border-radius: 50px;
            font-size: 13px;
            font-weight: 500;
            border: 1px solid rgba(201, 168, 76, 0.2);
            letter-spacing: 0.5px;
            backdrop-filter: blur(10px);
        }

        .app-header .badge i {
            font-style: normal;
            margin-right: 6px;
        }

        /* ===== TABS ===== */
        .tabs {
            display: flex;
            flex-wrap: wrap;
            gap: 0;
            background: #f8f9fd;
            padding: 0 12px;
            border-bottom: 2px solid #e8ebf2;
            position: relative;
        }

        .tab-btn {
            padding: 16px 28px;
            background: transparent;
            border: none;
            font-size: 13px;
            font-weight: 600;
            color: #6a7a92;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border-bottom: 3px solid transparent;
            margin-bottom: -2px;
            font-family: 'Inter', sans-serif;
            letter-spacing: 0.3px;
            display: flex;
            align-items: center;
            gap: 10px;
            position: relative;
        }

        .tab-btn .icon {
            font-size: 18px;
        }

        .tab-btn:hover {
            color: #0a1a3a;
            background: rgba(10, 26, 58, 0.03);
        }

        .tab-btn.active {
            color: #080c1a;
            border-bottom-color: #c9a84c;
            background: #ffffff;
        }

        .tab-btn .count-badge {
            background: #e8ebf2;
            color: #4a5a72;
            font-size: 10px;
            padding: 2px 10px;
            border-radius: 20px;
            font-weight: 700;
        }

        .tab-btn.active .count-badge {
            background: rgba(201, 168, 76, 0.15);
            color: #c9a84c;
        }

        /* ===== CONTENT ===== */
        .app-content {
            display: flex;
            flex-wrap: wrap;
            min-height: 700px;
        }

        /* ===== FORM PANEL ===== */
        .form-panel {
            flex: 0.9;
            min-width: 380px;
            padding: 32px 36px;
            background: #fafbff;
            border-right: 1px solid #e8ebf2;
        }

        .form-panel .panel-title {
            font-size: 20px;
            font-weight: 800;
            color: #080c1a;
            margin-bottom: 4px;
            font-family: 'Playfair Display', serif;
        }

        .form-panel .panel-sub {
            font-size: 14px;
            color: #6a7a92;
            margin-bottom: 24px;
            font-weight: 400;
            border-left: 3px solid #c9a84c;
            padding-left: 14px;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            font-weight: 600;
            font-size: 11px;
            color: #1a2a4a;
            margin-bottom: 4px;
            text-transform: uppercase;
            letter-spacing: 0.6px;
        }

        .form-group .hint {
            display: block;
            font-size: 10px;
            color: #8a9aba;
            margin-top: 3px;
            font-weight: 400;
        }

        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 10px 14px;
            border: 2px solid #e2e6ef;
            border-radius: 10px;
            font-size: 14px;
            font-family: 'Inter', sans-serif;
            transition: all 0.25s ease;
            background: #ffffff;
            color: #0a1a3a;
        }

        .form-group input:focus,
        .form-group textarea:focus,
        .form-group select:focus {
            outline: none;
            border-color: #c9a84c;
            box-shadow: 0 0 0 4px rgba(201, 168, 76, 0.08);
        }

        .form-group input::placeholder,
        .form-group textarea::placeholder {
            color: #aab4c8;
        }

        .form-group textarea {
            resize: vertical;
            min-height: 48px;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
        }

        .form-group .mandatory {
            color: #c0392b;
            font-weight: 700;
        }

        .form-divider {
            border: none;
            border-top: 2px solid #e8ebf2;
            margin: 22px 0 18px 0;
        }

        .btn-generate {
            background: linear-gradient(135deg, #080c1a, #1a2a4a);
            color: #ffffff;
            border: none;
            padding: 15px 28px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            width: 100%;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            margin-top: 8px;
            letter-spacing: 0.5px;
            font-family: 'Inter', sans-serif;
            position: relative;
            overflow: hidden;
        }

        .btn-generate::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 200%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.05), transparent);
            transition: left 0.6s;
        }

        .btn-generate:hover::before {
            left: 100%;
        }

        .btn-generate:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(8, 12, 26, 0.30);
        }

        .btn-generate:active {
            transform: translateY(0);
        }

        /* ===== PREVIEW PANEL ===== */
        .preview-panel {
            flex: 1.6;
            min-width: 480px;
            padding: 32px 36px;
            background: #ffffff;
        }

        .preview-panel .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            margin-bottom: 16px;
        }

        .preview-panel .panel-header h2 {
            font-size: 18px;
            font-weight: 700;
            color: #080c1a;
            font-family: 'Playfair Display', serif;
        }

        .preview-panel .panel-header .doc-type {
            font-size: 12px;
            color: #6a7a92;
            font-weight: 500;
            background: #f0f2f7;
            padding: 4px 16px;
            border-radius: 20px;
        }

        .preview-actions {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .preview-actions button {
            padding: 9px 20px;
            border: none;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: 'Inter', sans-serif;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .preview-actions button:hover {
            transform: translateY(-2px);
        }

        .btn-copy {
            background: #e8ebf2;
            color: #1a2a4a;
        }
        .btn-copy:hover {
            background: #d5dae6;
        }

        .btn-download {
            background: #1a2a4a;
            color: #ffffff;
        }
        .btn-download:hover {
            background: #080c1a;
            box-shadow: 0 4px 16px rgba(26, 42, 74, 0.25);
        }

        .btn-print {
            background: #2c3e5a;
            color: #ffffff;
        }
        .btn-print:hover {
            background: #1a2a4a;
            box-shadow: 0 4px 16px rgba(44, 62, 90, 0.25);
        }

        .preview-container {
            background: #fcfcff;
            border: 1px solid #e8ebf2;
            border-radius: 16px;
            padding: 28px 32px;
            max-height: 660px;
            overflow-y: auto;
            font-size: 11.5px;
            line-height: 1.6;
            white-space: pre-wrap;
            font-family: 'Times New Roman', Times, serif;
            color: #1a1a2e;
            box-shadow: inset 0 2px 8px rgba(0, 0, 0, 0.02);
        }

        .preview-container .empty-state {
            color: #8a9aba;
            text-align: center;
            padding: 60px 20px;
        }

        .preview-container .empty-state .big-icon {
            font-size: 48px;
            margin-bottom: 16px;
            display: block;
        }

        .preview-container .empty-state h3 {
            font-size: 20px;
            font-weight: 600;
            color: #4a5a72;
            font-family: 'Playfair Display', serif;
            margin-bottom: 8px;
        }

        .preview-container .empty-state p {
            font-size: 14px;
            color: #8a9aba;
            font-family: 'Inter', sans-serif;
        }

        /* ===== FOOTER ===== */
        .app-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 36px;
            background: #f8f9fd;
            border-top: 1px solid #e8ebf2;
            font-size: 13px;
            color: #6a7a92;
            flex-wrap: wrap;
        }

        .app-footer .left {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .app-footer .dot {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            margin-right: 6px;
            background: linear-gradient(135deg, #2ecc71, #27ae60);
            animation: pulse-dot 2s infinite;
        }

        @keyframes pulse-dot {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.6; transform: scale(0.9); }
        }

        .app-footer .count {
            font-weight: 600;
            color: #1a2a4a;
        }

        .app-footer .version {
            font-size: 11px;
            color: #aab4c8;
            letter-spacing: 0.5px;
        }

        /* ===== SCROLLBAR ===== */
        .preview-container::-webkit-scrollbar {
            width: 5px;
        }
        .preview-container::-webkit-scrollbar-track {
            background: #f0f2f7;
            border-radius: 8px;
        }
        .preview-container::-webkit-scrollbar-thumb {
            background: #c9c8d4;
            border-radius: 8px;
        }
        .preview-container::-webkit-scrollbar-thumb:hover {
            background: #a8aaba;
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 1024px) {
            .form-panel {
                flex: 1;
            }
            .preview-panel {
                flex: 1;
            }
        }

        @media (max-width: 820px) {
            .form-panel {
                border-right: none;
                border-bottom: 1px solid #e8ebf2;
            }
            .form-panel,
            .preview-panel {
                min-width: 100%;
                padding: 24px 20px;
            }
            .app-header {
                padding: 20px;
                flex-direction: column;
                gap: 12px;
                text-align: center;
            }
            .app-header .logo-area {
                justify-content: center;
            }
            .form-row {
                grid-template-columns: 1fr;
            }
            .tabs {
                padding: 0 6px;
                overflow-x: auto;
                flex-wrap: nowrap;
                gap: 0;
            }
            .tab-btn {
                padding: 12px 16px;
                font-size: 12px;
                white-space: nowrap;
            }
            .tab-btn .count-badge {
                display: none;
            }
            .preview-actions {
                gap: 4px;
            }
            .preview-actions button {
                padding: 6px 12px;
                font-size: 11px;
            }
            .app-footer {
                padding: 12px 20px;
                flex-direction: column;
                gap: 8px;
                text-align: center;
            }
        }

        @media (max-width: 480px) {
            body {
                padding: 12px;
            }
            .app-container {
                border-radius: 16px;
            }
            .app-header .logo-text {
                font-size: 18px;
            }
            .app-header .logo-icon {
                width: 44px;
                height: 44px;
                font-size: 18px;
            }
            .form-panel,
            .preview-panel {
                padding: 16px;
            }
            .preview-container {
                padding: 16px;
                max-height: 480px;
                font-size: 10px;
            }
            .btn-generate {
                font-size: 14px;
                padding: 12px 20px;
            }
        }

        /* ===== IMPRESSION ===== */
        @media print {
            body {
                background: #ffffff;
                padding: 0;
                margin: 0;
            }
            .app-container {
                box-shadow: none;
                border-radius: 0;
                max-width: 100%;
            }
            .app-container::before {
                display: none;
            }
            .app-header {
                background: #080c1a !important;
                -webkit-print-color-adjust: exact !important;
                print-color-adjust: exact !important;
                padding: 16px 30px;
                border-bottom: 3px solid #c9a84c !important;
            }
            .app-header::after {
                display: none;
            }
            .app-header .badge {
                background: rgba(201, 168, 76, 0.15) !important;
                -webkit-print-color-adjust: exact !important;
                print-color-adjust: exact !important;
            }
            .app-header .logo-icon {
                background: linear-gradient(145deg, #c9a84c, #f0d080) !important;
                -webkit-print-color-adjust: exact !important;
                print-color-adjust: exact !important;
            }
            .app-header .logo-icon::after {
                display: none;
            }
            .tabs {
                display: none !important;
            }
            .form-panel {
                display: none !important;
            }
            .preview-panel {
                min-width: 100% !important;
                padding: 16px 30px !important;
                border: none !important;
            }
            .preview-panel .panel-header {
                display: none !important;
            }
            .preview-actions {
                display: none !important;
            }
            .preview-container {
                max-height: none !important;
                overflow: visible !important;
                border: none !important;
                padding: 0 !important;
                background: #ffffff !important;
                font-size: 10.5pt !important;
                font-family: 'Times New Roman', Times, serif !important;
                line-height: 1.5 !important;
                box-shadow: none !important;
            }
            .preview-container div {
                font-family: 'Times New Roman', Times, serif !important;
                font-size: 10.5pt !important;
                line-height: 1.5 !important;
                white-space: pre-wrap !important;
            }
            .preview-container .empty-state {
                display: none !important;
            }
            .app-footer {
                display: none !important;
            }
            .btn-generate {
                display: none !important;
            }
            .tab-btn {
                display: none !important;
            }
        }
    </style>
</head>
<body>

    <div class="app-container">

        <!-- ===== HEADER ===== -->
        <header class="app-header">
            <div class="logo-area">
                <div class="logo-icon">E</div>
                <div>
                    <div class="logo-text">Egalyx <span> </span></div>
                    <div class="logo-sub">Suite Documentaire Juridique</div>
                </div>
            </div>
            <span class="badge"><i>✦</i> Générateur de Contrats</span>
        </header>

        <!-- ===== TABS ===== -->
        <div class="tabs" id="tabContainer">
            <button class="tab-btn active" data-tab="licence">
                <span class="icon">📜</span> Contrat de Licence
                <span class="count-badge">LOGICIEL</span>
            </button>
            <button class="tab-btn" data-tab="service">
                <span class="icon">🔧</span> Contrat de Service
                <span class="count-badge">PRESTATION</span>
            </button>
            <button class="tab-btn" data-tab="sla">
                <span class="icon">⚡</span> SLA
                <span class="count-badge">ENGAGEMENT</span>
            </button>
            <button class="tab-btn" data-tab="ndp">
                <span class="icon">🤝</span> NDA
                <span class="count-badge">CONFIDENTIALITÉ</span>
            </button>
        </div>

        <!-- ===== CONTENT ===== -->
        <div class="app-content">

            <!-- ===== FORM PANEL ===== -->
            <div class="form-panel" id="formPanel">
                <div id="formContent"></div>
            </div>

            <!-- ===== PREVIEW PANEL ===== -->
            <div class="preview-panel">
                <div class="panel-header">
                    <div>
                        <h2 id="previewTitle">📄 Aperçu du contrat</h2>
                    </div>
                    <div class="preview-actions">
                        <button class="btn-copy" onclick="copierDocument()">📋 Copier</button>
                        <button class="btn-download" onclick="telechargerDocument()">⬇️ Télécharger</button>
                        <button class="btn-print" onclick="imprimerDocument()">🖨️ Imprimer</button>
                    </div>
                </div>
                <div class="preview-container" id="previewContainer">
                    <div class="empty-state">
                        <span class="big-icon">📄</span>
                        <h3>Sélectionnez un contrat</h3>
                        <p>Choisissez un onglet, remplissez le formulaire, puis générez votre document.</p>
                    </div>
                </div>
            </div>

        </div>

        <!-- ===== FOOTER ===== -->
        <div class="app-footer">
            <div class="left">
                <span><span class="dot"></span> Egalyx   — Suite Juridique</span>
            </div>
            <div>
                <span class="count">✦</span> 4 contrats professionnels
            </div>
            <div class="version">v5.0 — Premium</div>
        </div>

    </div>

    <script>
        // ===== DONNÉES EGALYX =====
        const EGALYX = {
            nom: 'Egalyx',
            siret: '919 989 046 00025',
            rcs: 'Paris 919 989 046',
            ape: '7022Z',
            adresse: '45 Rue de Rome, 75008 Paris',
            email: 'contact@egalyx.com',
            tel: '+33 7 52 71 77 01',
            capital: '1 000 €'
        };

        // ===== FORMULAIRES =====
        const forms = {
            licence: `
                <div class="panel-title">📜 Contrat de Licence</div>
                <div class="panel-sub">Contrat de licence d'utilisation — Egalyx  </div>

                <div class="form-group">
                    <label>Client (Raison sociale) <span class="mandatory">*</span></label>
                    <input type="text" id="licenceClient" value="NSIA Banque Côte d'Ivoire" placeholder="Raison sociale du client">
                </div>

                <div class="form-group">
                    <label>Adresse du client <span class="mandatory">*</span></label>
                    <input type="text" id="licenceClientAdresse" value="01 BP 1234 Abidjan, Côte d'Ivoire" placeholder="Adresse complète">
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Nombre d'utilisateurs <span class="mandatory">*</span></label>
                        <input type="number" id="licenceUsers" value="50" min="1">
                    </div>
                    <div class="form-group">
                        <label>Durée (mois) <span class="mandatory">*</span></label>
                        <input type="number" id="licenceDuree" value="12" min="1">
                    </div>
                </div>

                <div class="form-group">
                    <label>Modules inclus</label>
                    <input type="text" id="licenceModules" value="Audit, Conformité, Risques, KRI, Reporting">
                </div>

                <div class="form-group">
                    <label>Ville de signature <span class="mandatory">*</span></label>
                    <input type="text" id="licenceVille" value="Abidjan">
                </div>

                <div class="form-group">
                    <label>Date de signature <span class="mandatory">*</span></label>
                    <input type="date" id="licenceDate" value="${new Date().toISOString().split('T')[0]}">
                </div>

                <button class="btn-generate" onclick="genererDocument('licence')">🔄 Générer le Contrat de Licence</button>
            `,

            service: `
                <div class="panel-title">🔧 Contrat de Prestation de Services</div>
                <div class="panel-sub">Contrat d'intégration, paramétrage et formation</div>

                <div class="form-group">
                    <label>Client (Raison sociale) <span class="mandatory">*</span></label>
                    <input type="text" id="serviceClient" value="NSIA Banque Côte d'Ivoire" placeholder="Raison sociale du client">
                </div>

                <div class="form-group">
                    <label>Adresse du client <span class="mandatory">*</span></label>

        // ===== UTILITAIRES =====
        function formatDate(dateStr) {
            if (!dateStr) return '[DATE]';
            const parts = dateStr.split('-');
            if (parts.length !== 3) return dateStr;
            const jour = parseInt(parts[2]);
            const mois = parseInt(parts[1]);
            const annee = parseInt(parts[0]);
            const moisNoms = ['janvier', 'février', 'mars', 'avril', 'mai', 'juin', 'juillet', 'août', 'septembre', 'octobre', 'novembre', 'décembre'];
            return `${jour} ${moisNoms[mois-1]} ${annee}`;
        }

        function copierDocument() {
            const texte = window._documentGenere || document.getElementById('previewContainer').innerText;
            if (!texte || texte.includes('Sélectionnez un contrat')) {
                alert('Veuillez d\'abord générer un document.');
                return;
            }
            navigator.clipboard.writeText(texte).then(() => {
                alert('✅ Document copié dans le presse-papiers !');
            }).catch(() => {
                const textarea = document.createElement('textarea');
                textarea.value = texte;
                document.body.appendChild(textarea);
                textarea.select();
                document.execCommand('copy');
                document.body.removeChild(textarea);
                alert('✅ Document copié !');
            });
        }

        function telechargerDocument() {
            const texte = window._documentGenere || document.getElementById('previewContainer').innerText;
            if (!texte || texte.includes('Sélectionnez un contrat')) {
                alert('Veuillez d\'abord générer un document.');
                return;
            }
            const nom = document.querySelector('.tab-btn.active')?.textContent.trim().replace(/[📜🔧⚡🤝]/g, '').trim() || 'contrat';
            const blob = new Blob([texte], { type: 'text/plain;charset=utf-8' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `${nom}_Egalyx_${new Date().toISOString().split('T')[0]}.txt`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

            }

            const win = window.open('', '_blank', 'width=1000,height=750');
            win.document.write(`

                <head>
                    <meta charset="UTF-8">

                    <style>
                        body {

                            letter-spacing: 1px;
                        }

                            font-style: italic;
                        }

                <body>

        document.querySelectorAll('.tab-btn').forEach(btn => {
