<!-- templates/admin/editer_article.html -->
{% extends "base.html" %}

{% block title %}Modifier l'article - Administration | Egalyx Control{% endblock %}

{% block content %}
<div class="container-fluid py-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h1 class="h2 mb-1">
                <i class="fas fa-edit text-primary me-2"></i>
                Modifier l'article
            </h1>
            <nav aria-label="breadcrumb">
                <ol class="breadcrumb">
                    <li class="breadcrumb-item"><a href="{{ url_for('dashboard') }}">Dashboard</a></li>
                    <li class="breadcrumb-item"><a href="{{ url_for('admin_articles') }}">Articles</a></li>
                    <li class="breadcrumb-item active" aria-current="page">{{ article.titre|truncate(50) }}</li>
                </ol>
            </nav>
        </div>
    </div>
    
    <!-- Même formulaire que nouvel_article.html mais pré-rempli -->
    <div class="fk-card">
        <div class="fk-card-header">
            <h5 class="mb-0 text-white">
                <i class="fas fa-edit me-2"></i>Modifier l'article
            </h5>
        </div>
        <div class="fk-card-body">
            <form method="POST" enctype="multipart/form-data">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                <!-- ... (même formulaire que nouvel_article) ... -->
            </form>
        </div>
    </div>
</div>
{% endblock %}
